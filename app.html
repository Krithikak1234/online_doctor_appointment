<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Doctor Appointment</title>
</head>


<body style="background-color:black; color:white; font-family:Arial;">


<center>
    <h1>Doctor Appointment</h1>
    <h3>Book Appointment</h3>


    <form style="width:300px; text-align:left;" onsubmit="saveData(event)">


        <p>Patient Name</p>
        <input type="text" id="name" style="width:100%; padding:8px;" required>


        <p>Email</p>
        <input type="email" id="email" style="width:100%; padding:8px;" required>


        <p>Phone Number</p>
        <input type="tel" id="phone" style="width:100%; padding:8px;" required>


        <p>Select Doctor</p>
        <select id="doctor" style="width:100%; padding:8px;" required>
            <option value="">--Choose Doctor--</option>
            <option>Dr. Smith</option>
            <option>Dr. John</option>
            <option>Dr. Priya</option>
        </select>


        <p>Appointment Date</p>
        <input type="date" id="date" style="width:100%; padding:8px;" required>


        <p>Appointment Time</p>
        <input type="time" id="time" style="width:100%; padding:8px;" required>


        <br><br>


        <button type="submit" style="width:100%; padding:10px; background:green; color:white;">
            Book Appointment
        </button>


    </form>


    <p id="msg" style="color:lightgreen;"></p>


</center>


<script>
function saveData(event) {
    event.preventDefault(); // stop page reload


    // Get values
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let phone = document.getElementById("phone").value;
    let doctor = document.getElementById("doctor").value;
    let date = document.getElementById("date").value;
    let time = document.getElementById("time").value;


    // Save in localStorage
    localStorage.setItem("name", name);
    localStorage.setItem("email", email);
    localStorage.setItem("phone", phone);
    localStorage.setItem("doctor", doctor);
    localStorage.setItem("date", date);
    localStorage.setItem("time", time);


    // Show message
    document.getElementById("msg").innerHTML = "Appointment Booked Successfully!";


    // Clear form
    document.querySelector("form").reset();
}
</script>


</body>
</html>
