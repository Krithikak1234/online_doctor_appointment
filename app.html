<!DOCTYPE html>
<html>
<head>
    <title>Doctor Appointment</title>
</head>

<body>

    <h1>Doctor Appointment Booking</h1>

    <form>

        <input type="text"
               placeholder="Patient Name"
               required>

        <br><br>

        <input type="date"
               required>

        <br><br>

        <input type="time"
               required>

        <br><br>

        <button type="submit">
            Book Appointment
        </button>

    </form>

</body>
</html>
