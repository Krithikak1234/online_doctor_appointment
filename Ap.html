<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Doctor Appointment</title>
</head>


<body style="background-color:black; color:white; font-family:Arial;">


<center>
    <h1>Doctor Appointment</h1>
    <h3>Book Appointment</h3>


    <form style="width:300px; text-align:left;">


        <p>Patient Name</p>
        <input type="text" style="width:100%; padding:8px;">


        <p>Email</p>
        <input type="email" style="width:100%; padding:8px;">


        <p>Phone Number</p>
        <input type="tel" style="width:100%; padding:8px;">


        <p>Select Doctor</p>
        <select style="width:100%; padding:8px;">
            <option>--Choose Doctor--</option>
            <option>Dr. Smith</option>
            <option>Dr. John</option>
            <option>Dr. Priya</option>
        </select>


        <p>Appointment Date</p>
        <input type="date" style="width:100%; padding:8px;">


        <p>Appointment Time</p>
        <input type="time" style="width:100%; padding:8px;">


        <br><br>


        <button style="width:100%; padding:10px; background:green; color:white;">
            Book Appointment
        </button>


    </form>
</center>


</body>
</html>
